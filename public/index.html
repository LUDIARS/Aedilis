<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    
    
    
    
            
    
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aedilis — 施設予約</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Aedilis</h1>
    <span class="tagline">施設予約</span>
    <a class="nav-link" href="/checkin.html">出席チェックイン</a>
    <span id="user" class="user"></span>
  </header>

  <main id="app">
    <section class="panel">
      <h2>新規予約</h2>
      <form id="reserve-form">
        <label>施設
          <select id="f-facility" required></select>
        </label>
        <div id="facility-info" class="facility-info"></div>
        <label>開始
          <input id="f-start" type="datetime-local" required />
        </label>
        <label>終了
          <input id="f-end" type="datetime-local" required />
        </label>
        <label>目的
          <input id="f-purpose" type="text" maxlength="200" placeholder="(任意)" />
        </label>
        <button type="submit">予約する</button>
      </form>
      <p id="status"></p>
    </section>

    <section class="panel">
      <h2>予約一覧</h2>
      <div class="filter-bar">
        <label>施設
          <select id="filter-facility"></select>
        </label>
        <label class="checkbox">
          <input id="filter-mine" type="checkbox" />
          自分の予約のみ
        </label>
      </div>
      <div id="reservations"></div>
    </section>

    <section class="panel" id="admin-panel" hidden>
      <h2>施設管理 <span class="badge">admin</span></h2>
      <p class="hint">重複可: ON にした施設は同一時間帯の重複予約を許可します。</p>
      <div id="admin-facilities"></div>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
