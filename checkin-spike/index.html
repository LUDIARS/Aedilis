<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aedilis Check-in Spike</title>
    <style>
      /* Step1 なので Foundation UI 化はしない。 雑な見た目で良い。 */
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
      button { font-size: 1rem; padding: 0.6rem 1rem; margin: 0.25rem 0.5rem 0.25rem 0; cursor: pointer; }
      pre { background: #111; color: #0f0; padding: 1rem; border-radius: 6px; white-space: pre-wrap; word-break: break-all; min-height: 8rem; }
      .note { color: #555; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>Aedilis 出席チェックイン — Step1 スパイク</h1>
    <p class="note">
      ①初回だけ「登録」(passkey 作成)。 ②以後は「チェックイン」だけ
      (nonce を passkey で署名 → LAN がオフライン検証 → attestation →
      クラウド検証 → 出席確定)。 ボタンを押すと OS の生体認証が出ます。
    </p>
    <button id="btn-register">① 初回登録 (passkey 作成)</button>
    <button id="btn-checkin">② チェックイン</button>
    <pre id="log"></pre>
    <script type="module" src="/client.js"></script>
  </body>
</html>
